global:
  # How often Prometheus scrapes each target.
  # Every 15 seconds is the standard — frequent enough for real-time dashboards,
  # infrequent enough to not add meaningful load to your API.
  scrape_interval: 15s

  # How long Prometheus waits for a scrape to complete before marking it failed.
  scrape_timeout: 10s

scrape_configs:
  - job_name: "trial-terminator-api"
    # "api" is the Docker Compose service name — Docker's internal DNS
    # resolves it to the API container's IP automatically.
    # This is why all services must be on the same Docker network.
    static_configs:
      - targets: ["api:8080"]
    metrics_path: "/metrics"
